[compare]
; Additivity test: two layers of the same material (1.8 mm + 1.2 mm Cu)
; must give the same wake as a single layer of 3.0 mm Cu, regardless
; of the boundary type. This file points to two sub-configs (caseA, caseB)
; and tells the wake runner to execute both and produce a comparison.
caseA = caseA.cfg
caseB = caseB.cfg
labelA = single Cu 3.0 mm
labelB = double Cu 1.8 + 1.2 mm
description = Additivity check (PEC boundary):
              two same-material layers vs a single layer of summed thickness.

[additivity_check]
; If true, the runner compares each wake quantity between caseA and caseB
; and reports PASS / FAIL based on the relative-error threshold below.
; Set to false when caseA and caseB are NOT physically equivalent (the
; runner will then produce comparison plots without a pass/fail verdict).
enabled = true
threshold = 1e-9
