[compare]
; Negligibility test: a thin 100 nm Cu layer on top of a 1.0 mm Cu layer
; should be effectively invisible compared to a plain 1.0 mm Cu layer.
; This is NOT a strict additivity test (the two configurations have a
; different total Cu thickness, 1.0 mm vs 1.0001 mm), but rather a check
; that an extra sub-skin-depth layer does not perturb the wake.
caseA = caseA.cfg
caseB = caseB.cfg
labelA = single Cu 1.0 mm
labelB = Cu 100 nm + Cu 1.0 mm
description = Negligibility check (CW stainless 1mm boundary):
              a 100 nm extra Cu layer must be effectively invisible
              with respect to the underlying 1.0 mm Cu layer.

[additivity_check]
; Loose threshold: the two configurations are NOT mathematically equivalent
; (different total thickness), but they should be physically close. A 1e-4
; ceiling on max|A-B|/max|A| means agreement at the 0.01 % level.
enabled = true
threshold = 1e-4
