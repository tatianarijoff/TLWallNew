[base_info]
; Test configuration for wake-only calculation (CalcWake = wake).
; Only the time parameters are required; no [frequency_info] section.
component_name = wake_only
pipe_radius_m = 0.0184
pipe_len_m = 1.000000e+00
betax = 1.000000e+00
betay = 1.000000e+00
chamber_shape = CIRCULAR

[layers_info]
nbr_layers = 1

[layer0]
type = CW
thick_m = 5e-7
muinf_Hz = 0
k_Hz = inf
sigmaDC = 1e6
epsr = 1.000000e+00
tau = 0.000000e+00
RQ = 0.00

[boundary]
type = CW
muinf_Hz = 0
k_Hz = inf
sigmaDC = 1e9
epsr = 1.000000e+00
tau = 0.000000e+00
RQ = 0.00

[beam_info]
test_beam_shift = 0.01
gammarel = 10000

[calc_info]
; CalcWake selects what to compute: impedance | wake | both
CalcWake = wake

[time_info]
; Logarithmic time grid: 10^tmin_exp ... 10^tmax_exp s, n_points samples
tmin_exp = -11
tmax_exp = -3
n_points = 801
