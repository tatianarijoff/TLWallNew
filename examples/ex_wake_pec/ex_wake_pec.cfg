[base_info]
; Round Cu pipe (r = 22 mm, L = 1 m), Cu wall 2 mm, PEC outside.
; The CW layer is the only source of wake; the PEC boundary acts as a
; perfect mirror, so all the field is confined within the CW layer.
component_name = ex_wake_pec
pipe_radius_m = 0.022
pipe_len_m = 1.0
betax = 1.0
betay = 1.0
chamber_shape = CIRCULAR

[layers_info]
nbr_layers = 1

[layer0]
type = CW
thick_m = 2e-3
muinf_Hz = 0
k_Hz = inf
sigmaDC = 5.96e7
epsr = 1.0
tau = 0.0
RQ = 0.0

[boundary]
type = PEC

[beam_info]
; LHC 7 TeV protons.
test_beam_shift = 0.01
gammarel = 7460.52

[calc_info]
CalcWake = wake

[time_info]
; Logarithmic time grid from 1 ps to 100 ms, 1401 points.
tmin_exp = -12
tmax_exp = -1
n_points = 1401
